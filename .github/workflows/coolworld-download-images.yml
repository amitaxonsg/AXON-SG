name: Coolworld Download Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download images from existing image_urls.txt
        run: |
          cd coolworldaircon-restore
          mkdir -p images

          python3 <<'PY'
          import os, urllib.request, urllib.parse, time

          urls = [x.strip() for x in open("image_urls.txt") if x.strip()]
          downloaded = []

          for i, url in enumerate(urls, 1):
              original = url.split("if_/", 1)[-1]
              path = urllib.parse.urlparse(original).path
              fname = os.path.basename(path)

              if not fname:
                  fname = f"image-{i}.jpg"

              fname = urllib.parse.unquote(fname)
              safe = f"{i:03d}-{fname}"
              out = os.path.join("images", safe)

              print("Downloading", safe)

              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=90) as r:
                      data = r.read()

                  if len(data) > 1024:
                      with open(out, "wb") as f:
                          f.write(data)
                      downloaded.append(out)
                  else:
                      print("Skipped small file", safe)

              except Exception as e:
                  print("FAILED", safe, e)

              time.sleep(0.3)

          with open("restored-images.txt", "w") as f:
              f.write("\n".join(downloaded) + "\n")

          print("Downloaded files:", len(downloaded))
          PY

      - name: Commit downloaded images
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coolworldaircon-restore/images coolworldaircon-restore/restored-images.txt
          git commit -m "Download Coolworld restored images from Wayback URLs" || echo "Nothing to commit"
          git push
