name: Coolworld Image Downloader

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Coolworld images from existing URL list
        run: |
          cd coolworldaircon-restore
          mkdir -p images

          python3 <<'PY'
          import os, urllib.request, urllib.parse, time

          urls = [x.strip() for x in open("image_urls.txt") if x.strip()]
          downloaded = []

          for i, url in enumerate(urls, 1):
              original = url.split("if_/", 1)[-1]
              path = urllib.parse.urlparse(original).path.lstrip("/")
              dest = os.path.join(".", path)
              os.makedirs(os.path.dirname(dest), exist_ok=True)

              print(f"[{i}/{len(urls)}] {path}")

              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=120) as r:
                      data = r.read()

                  if len(data) > 1024:
                      with open(dest, "wb") as f:
                          f.write(data)
                      downloaded.append(path)
                  else:
                      print("Small file skipped")

              except Exception as e:
                  print("FAILED", url, e)

              time.sleep(0.5)

          with open("restored-images.txt", "w") as f:
              f.write("\n".join(downloaded) + "\n")

          print("Downloaded:", len(downloaded))
          PY

      - name: Commit downloaded images
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coolworldaircon-restore
          git commit -m "Download Coolworld restored images from Wayback" || echo "Nothing to commit"
          git push
