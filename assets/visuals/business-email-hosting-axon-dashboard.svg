<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Axon business email hosting and mailbox delivery dashboard</title>
  <desc id="desc">A branded Axon 1ProIT business email hosting visual showing mailboxes, DNS records, SMTP delivery, spam protection and support monitoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06204c"/>
      <stop offset="0.55" stop-color="#003087"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#eaf4ff" stop-opacity="0.94"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="170" fill="#ffffff" opacity="0.08"/>
  <circle cx="160" cy="660" r="210" fill="#ffffff" opacity="0.08"/>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="64" width="1060" height="632" rx="30" fill="url(#panel)" stroke="#d6e6ff" stroke-width="2"/>
    <rect x="70" y="64" width="1060" height="76" rx="30" fill="#f7fbff"/>
    <text x="120" y="112" fill="#003087" font-size="28" font-weight="700">AXON 1ProIT Business Email Hosting</text>
    <text x="850" y="112" fill="#059669" font-size="18" font-weight="700">Mail delivery healthy</text>

    <g transform="translate(120 182)">
      <rect width="430" height="284" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
      <text x="30" y="46" fill="#003087" font-size="22" font-weight="700">Business mailboxes</text>
      <g transform="translate(30 78)">
        <rect width="370" height="54" rx="14" fill="#eff6ff"/>
        <circle cx="30" cy="27" r="16" fill="#003087"/>
        <path d="M20 22l10 8 10-8" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="64" y="24" fill="#1f2937" font-size="16" font-weight="700">admin@company.com</text>
        <text x="64" y="42" fill="#64748b" font-size="13">IMAP / SMTP / webmail ready</text>
      </g>
      <g transform="translate(30 146)">
        <rect width="370" height="54" rx="14" fill="#f0fdfa"/>
        <circle cx="30" cy="27" r="16" fill="#0f766e"/>
        <path d="M20 22l10 8 10-8" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="64" y="24" fill="#1f2937" font-size="16" font-weight="700">sales@company.com</text>
        <text x="64" y="42" fill="#64748b" font-size="13">Contact forms and replies supported</text>
      </g>
      <g transform="translate(30 214)">
        <rect width="370" height="38" rx="12" fill="#fff7ed"/>
        <text x="18" y="25" fill="#9a3412" font-size="15" font-weight="700">Mailbox quota, passwords and spam checks monitored</text>
      </g>
    </g>

    <g transform="translate(598 182)">
      <rect width="482" height="284" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
      <text x="30" y="46" fill="#003087" font-size="22" font-weight="700">DNS and delivery setup</text>
      <g transform="translate(30 76)">
        <rect width="420" height="42" rx="12" fill="#eff6ff"/>
        <text x="18" y="27" fill="#1e3a8a" font-size="15" font-weight="700">MX record</text>
        <text x="160" y="27" fill="#334155" font-size="15">Routes mail to the right server</text>
      </g>
      <g transform="translate(30 130)">
        <rect width="420" height="42" rx="12" fill="#f0fdfa"/>
        <text x="18" y="27" fill="#0f766e" font-size="15" font-weight="700">SPF / DKIM</text>
        <text x="160" y="27" fill="#334155" font-size="15">Helps reduce spam and spoofing</text>
      </g>
      <g transform="translate(30 184)">
        <rect width="420" height="42" rx="12" fill="#fefce8"/>
        <text x="18" y="27" fill="#854d0e" font-size="15" font-weight="700">DMARC</text>
        <text x="160" y="27" fill="#334155" font-size="15">Protects brand email reputation</text>
      </g>
      <g transform="translate(30 238)">
        <rect width="420" height="28" rx="10" fill="#f8fafc"/>
        <text x="18" y="19" fill="#475569" font-size="14">Axon explains and configures this in plain language.</text>
      </g>
    </g>

    <g transform="translate(120 510)">
      <rect width="960" height="116" rx="24" fill="#f8fbff" stroke="#dbeafe"/>
      <g transform="translate(34 24)">
        <circle cx="34" cy="34" r="34" fill="#003087"/>
        <path d="M17 28h34v22H17z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
        <path d="M17 28l17 13 17-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="110" y="50" fill="#003087" font-size="22" font-weight="700">Business email hosting should be simple for your staff</text>
      <text x="110" y="80" fill="#475569" font-size="17">Axon helps with mailbox setup, DNS, webmail, Outlook/phone setup, delivery issues, form email and ongoing support.</text>
    </g>
  </g>
</svg>
